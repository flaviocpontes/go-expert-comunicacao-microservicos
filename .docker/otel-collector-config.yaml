receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

extensions:
  health_check:

exporters:
  zipkin:
    endpoint: "http://zipkin:9411/api/v2/spans"
  
  prometheus:
    endpoint: "0.0.0.0:8889"

  debug:
    verbosity: basic

processors:
  batch:

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [zipkin, debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus, debug]
